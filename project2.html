<!DOCTYPE html>
<html lang="en">
<head>

    <title>Biodata Kanisian</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
            padding: 40px 0;
        }
        
        .container {
            max-width: 1000px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;

            font-size: 2rem;

        }

        }

        }
        
        .button-container {

            padding: 12px;

<div class="d-flex justify-content-center mb-3">
